<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="InterviewAI  mock interview practice with real-time AI coaching">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1222" />
      <stop offset="100%" stop-color="#1b0f28" />
    </linearGradient>
    <radialGradient id="coral" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e85547" stop-opacity="0.55" />
      <stop offset="70%" stop-color="#e85547" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="violet" cx="80%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.5" />
      <stop offset="70%" stop-color="#5b21b6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea6f5f" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#coral)" />
  <rect width="1200" height="630" fill="url(#violet)" />

  <g transform="translate(80,110)">
    <g>
      <rect x="0" y="0" width="72" height="72" rx="18" fill="url(#text)" />
      <text x="36" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="#0f1222">IA</text>
    </g>
    <text x="96" y="48" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="24" fill="#e7e9f3" letter-spacing="2">InterviewAI</text>
  </g>

  <g transform="translate(80,230)">
    <text font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="80" fill="#ffffff" letter-spacing="-2">
      <tspan x="0" y="0">Mock interviews</tspan>
      <tspan x="0" y="96">with a coach</tspan>
      <tspan x="0" y="192" font-style="italic" fill="url(#text)">that sees and hears.</tspan>
    </text>
  </g>

  <g transform="translate(80,560)" font-family="Inter, system-ui, sans-serif">
    <text font-size="20" fill="#aaaec2" letter-spacing="1">Adaptive follow-ups ¯ Real-time speech &amp; gaze analytics ¯ PDF scorecards</text>
  </g>
</svg>
