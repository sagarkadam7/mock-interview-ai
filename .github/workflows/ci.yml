name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend tests
        working-directory: backend
        run: npm test

      - name: Backend boot smoke check
        working-directory: backend
        run: node -e "console.log('backend deps ok')"

      - name: Backend npm audit (fail on high)
        working-directory: backend
        run: npm audit --audit-level=high


